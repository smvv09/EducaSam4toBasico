<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plataforma Educativa 4to Básico</title>
    <link rel="stylesheet" href="css/style.login.css">

    <!-- Favicon -->
    <link rel="icon" href="img/favicoon.png">
</head>

<body>

    <div class="container">

        <!-- Logo -->
        <img src="img/plataforma.png" class="logo">

        <h1>Bienvenido a EducaSam 4to Básico</h1>

        <!-- Nombre -->
        <input type="text" id="nombre" placeholder="Ingresa tu nombre">

        <!-- Avatares -->
        <h3>Selecciona un avatar</h3>

        <div class="avatars">
            <img src="img/avatar1.png" onclick="seleccionarAvatar(this)">
            <img src="img/avatar2.png" onclick="seleccionarAvatar(this)">
            <img src="img/avatar3.png" onclick="seleccionarAvatar(this)">
            <img src="img/avatar4.png" onclick="seleccionarAvatar(this)">
            <img src="img/avatar5.png" onclick="seleccionarAvatar(this)">
            <img src="img/avatar6.png" onclick="seleccionarAvatar(this)">
        </div>

        <button onclick="ingresar()">Ingresar</button>
    </div>

    <!-- Audios -->
    <audio id="audioError" src="sonido/error.mp3"></audio>
    <audio id="audioAvatar" src="sonido/avatar.mp3"></audio>
    <audio id="audioBien" src="sonido/bien.mp3"></audio>

    <!-- 🎉 LIBRERÍA CONFETTI -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="js/script.login.js"></script>

</body>
</html>
