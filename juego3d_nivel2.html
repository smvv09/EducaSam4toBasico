<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Juego Figuras 3D - Nivel 2</title>

    <link rel="stylesheet" href="css/style.juego3d.css">

</head>

<body>

<div class="usuario">

    <img id="usuarioAvatar">

    <span id="usuarioNombre"></span>

</div>

<div class="container">

    <h1>🎮 Juego Figuras 3D - Nivel 2</h1>

    <p>Arrastra cada nombre hacia la figura correcta</p>

    <div class="zona-juego">

        <div class="tarjeta">

            <img src="img/objetos/cono.png">

            <div class="dropzone" data-correcto="Cono"></div>

        </div>

        <div class="tarjeta">

            <img src="img/objetos/piramide.png">

            <div class="dropzone" data-correcto="Pirámide"></div>

        </div>

    </div>

    <div class="opciones" id="opciones">

        <div class="drag" draggable="true">
            Pirámide
        </div>

        <div class="drag" draggable="true">
            Cono
        </div>

    </div>

    <div class="revisar-container">

        <button class="btn-revisar" onclick="revisarJuego()">
            Revisar
        </button>

    </div>

    <div class="navegacion">

        <button class="btn-volver" onclick="volverNivel1()">
            Volver
        </button>

        <button class="btn-siguiente" onclick="finalizarJuego()">
            Finalizar
        </button>

    </div>

</div>

<script src="js/script.juego3d_nivel2.js"></script>

</body>

</html>
