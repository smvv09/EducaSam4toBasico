<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Figuras 3D</title>

    <link rel="stylesheet" href="css/style.matematicas.css">

    <link rel="icon" href="img/favicoon.png">

</head>

<body>

<!-- USUARIO -->

<div class="usuario">

    <img id="usuarioAvatar">

    <span id="usuarioNombre"></span>

</div>

<!-- CONTENIDO -->

<div class="container">

    <h1>Figuras Geométricas 3D</h1>

    <p>
        Aprende todas las figuras para desbloquear el juego 🎮
    </p>

    <!-- IMAGEN -->

    <div class="imagen-container">

        <img id="imagenFigura"
             src="img/figuras3d/cubo.png"
             onclick="hablarFiguraActual()">

    </div>

    <!-- BOTONES -->

    <div class="figuras">

        <button id="btn-cubo"
                onclick="mostrarFigura('cubo')">
            Cubo
        </button>

        <button id="btn-esfera"
                onclick="mostrarFigura('esfera')">
            Esfera
        </button>

        <button id="btn-cono"
                onclick="mostrarFigura('cono')">
            Cono
        </button>

        <button id="btn-cilindro"
                onclick="mostrarFigura('cilindro')">
            Cilindro
        </button>

        <button id="btn-pirámide"
                onclick="mostrarFigura('pirámide')">
            Pirámide
        </button>

    </div>

    <!-- NAVEGACION -->

    <div class="navegacion">

        <button class="btn-volver"
                onclick="volverMenu()">
            Volver
        </button>

        <button id="btnSiguiente"
                class="btn-siguiente"
                onclick="siguiente()"
                disabled>
            Siguiente
        </button>

    </div>

</div>

<!-- CONFETTI -->

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script src="js/script.figuras3d.js"></script>

</body>

</html>
