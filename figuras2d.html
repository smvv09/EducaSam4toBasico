<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Figuras 2D</title>

    <link rel="stylesheet" href="css/style.matematicas.css">

    <link rel="icon" href="img/favicoon.png">

</head>

<body>

<!-- USUARIO -->

<div class="usuario">

    <img id="usuarioAvatar">

    <span id="usuarioNombre"></span>

</div>

<!-- CONTENIDO -->

<div class="container">

    <h1>Figuras Geométricas 2D</h1>

    <p>
        Aprende todas las figuras para desbloquear el juego 🎮
    </p>

    <!-- IMAGEN -->

    <div class="imagen-container">

        <img id="imagenFigura"
            src="img/figuras2d/círculo.png"
            onclick="hablarFiguraActual()">

    </div>

    <!-- BOTONES -->

    <div class="figuras">

        <button id="btn-círculo"
                onclick="mostrarFigura('círculo')">
            Círculo
        </button>

        <button id="btn-cuadrado"
                onclick="mostrarFigura('cuadrado')">
            Cuadrado
        </button>

        <button id="btn-rectángulo"
                onclick="mostrarFigura('rectángulo')">
            Rectángulo
        </button>

        <button id="btn-triángulo"
                onclick="mostrarFigura('triángulo')">
            Triángulo
        </button>

        <button id="btn-rombo"
                onclick="mostrarFigura('rombo')">
            Rombo
        </button>

        <button id="btn-óvalo"
                onclick="mostrarFigura('óvalo')">
            Óvalo
        </button>

    </div>

    <!-- NAVEGACION -->

    <div class="navegacion">

        <button class="btn-volver"
                onclick="volverMenu()">
            Volver
        </button>

        <button id="btnSiguiente"
                class="btn-siguiente"
                onclick="siguiente()"
                disabled>
            Siguiente
        </button>

    </div>

</div>

<!-- CONFETTI -->

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script src="js/script.figuras2d.js"></script>

</body>

</html>
