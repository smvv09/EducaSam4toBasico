<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Juego Figuras 2D - Nivel 2</title>

    <link rel="stylesheet" href="css/style.juego2d.css">

</head>

<body>

<!-- USUARIO -->

<div class="usuario">

    <img id="usuarioAvatar">

    <span id="usuarioNombre"></span>

</div>

<!-- CONTENEDOR -->

<div class="container">

    <h1>🎮 Juego Figuras 2D - Nivel 2</h1>

    <p>Arrastra cada nombre hacia la figura correcta</p>

    <!-- FIGURAS -->

    <div class="zona-juego">

        <!-- RECTANGULO -->

        <div class="tarjeta">

            <img src="img/figuras2d/rectángulo.png">

            <div class="dropzone" data-correcto="Rectángulo"></div>

        </div>

        <!-- ROMBO -->

        <div class="tarjeta">

            <img src="img/figuras2d/rombo.png">

            <div class="dropzone" data-correcto="Rombo"></div>

        </div>

        <!-- OVALO -->

        <div class="tarjeta">

            <img src="img/figuras2d/óvalo.png">

            <div class="dropzone" data-correcto="Óvalo"></div>

        </div>

    </div>

    <!-- OPCIONES -->

    <div class="opciones" id="opciones">

        <div class="drag" draggable="true">
            Rombo
        </div>

        <div class="drag" draggable="true">
            Óvalo
        </div>

        <div class="drag" draggable="true">
            Rectángulo
        </div>

    </div>

    <!-- REVISAR -->

    <div class="revisar-container">

        <button class="btn-revisar" onclick="revisarJuego()">
            Revisar
        </button>

    </div>

    <!-- NAVEGACION -->

    <div class="navegacion">

        <button class="btn-volver" onclick="volverNivel1()">
            Volver
        </button>

        <button class="btn-siguiente" onclick="finalizarJuego()">
            Finalizar
        </button>

    </div>

</div>

<script src="js/script.juego2d_nivel2.js"></script>

</body>

</html>
